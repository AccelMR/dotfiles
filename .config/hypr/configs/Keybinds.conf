# ---------------- App-Specific Rules ----------------

$mainMod = SUPER
$files_main = dolphin
$browser = helium
$termPri = kitty
$scriptsDir = $HOME/.config/scripts

# Misc
$ani-cli-cmd = ani-cli-mpv

# ---------------- System Controls ----------------

# Power
bind = , xf86poweroff, exec, systemctl suspend
bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = CTRL ALT, P, exec, $scriptsDir/RofiPower.sh

# Hyprland
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, Escape, exec, hyprctl kill

# Wayland
bind = CTRL ALT, W, exec, $scriptsDir/StartWaybar.sh
bind = $mainMod, W, exec, pkill waypaper || true && waypaper

# ---------------- App Launchers ----------------

# Rofi

binddr = $mainMod, Space, App Launcher, exec, pkill rofi || rofi -matching fuzzy -show drun -modi drun,filebrowser
#bindr = $mainMod, Space, exec, pkill wofi || wofi --show drun --conf $HOME/.config/wofi/config --cache-file ~/.cache/wofi-cache

# Apps
bind = $mainMod, Return, exec, $termPri
bind = $mainMod, E, exec, $files_main
bind = $mainMod, B, exec, $browser
bind = , xf86calculator, exec, qalculate-qt #f3

# Ani-cli
bind = , xf86explorer, exec, $ani-cli-cmd -q 1080p --dub --rofi #f1
bind = , xf86homepage, exec, $ani-cli-cmd -q 1080p --rofi #f2
bind = , xf86tools, exec, $ani-cli-cmd -c --rofi #f4

# ---------------- Window Management ----------------

# Window States
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod ALT, F, exec, hyprctl dispatch workspaceopt allfloat
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, Q, killactive,
bind = $mainMod, P, pin,

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# move window with mainMod + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Layout

# Grouping
bind = $mainMod, G, togglegroup # toggle group
bind = $mainMod, tab, changegroupactive  # change focus to another window
bind = $mainMod CTRL, R, moveoutofgroup  # change focus to another window

# Resize
bind = $mainMod CTRL, left, resizeactive,-50 0
bind = $mainMod CTRL, right, resizeactive,50 0
bind = $mainMod CTRL, up, resizeactive,0 -50
bind = $mainMod CTRL, down, resizeactive,0 50

# Move/Resize with Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ---------------- Workspace Management ----------------

# Special Workspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,

# Switch Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Move to Workspaces
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Move to Workspaces (Silent)
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# ---------------- Multimedia Controls ----------------

# Brightness
bindel = , xf86monbrightnessup, exec, brightnessctl set 5%+
bindel = , xf86monbrightnessdown, exec, brightnessctl set 5%-

# Audio mapping
binde = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc
binde = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec
binde = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle

# Media
bind = , xf86AudioPlayPause, exec, $scriptsDir/MediaControl.sh --pause
bind = , xf86AudioPause, exec, $scriptsDir/MediaControl.sh --pause
bind = , xf86AudioPlay, exec, $scriptsDir/MediaControl.sh --pause
bind = , xf86AudioNext, exec, $scriptsDir/MediaControl.sh --nxt
bind = , xf86AudioPrev, exec, $scriptsDir/MediaControl.sh --prv
bind = , xf86audiostop, exec, $scriptsDir/MediaControl.sh --stop

# ---------------- Screenshot ----------------
bind = $mainMod SHIFT, S, exec, hyprshot -m region --raw | swappy -f -
bind = , Print, exec, hyprshot -m region --raw | swappy -f -

# ---------------- Misc ----------------

# Clip Manager
bind = $mainMod, V, exec, $scriptsDir/ClipManager.sh

# Swaync
bind = $mainMod, N, exec, swaync-client -t -sw

# Window Cycle
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop

# Hyprlock
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/hyprlock.conf

#Home and End for laptop
# Custom binds for Home and End using Super key
bind = SUPER SHIFT, Left, sendshortcut, , Home, 
bind = SUPER SHIFT, Right, sendshortcut, , End,

